repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-case-conflict

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.10
        args: ['--line-length=120']

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=120', '--ignore=E501,W503']
        files: ^src/

  - repo: local
    hooks:
      - id: no-pycache-commit
        name: '__pycache__ dizini commit edilmesin'
        language: system
        entry: bash -c 'git diff --cached --name-only | grep -q "__pycache__" && echo "ERROR: __pycache__ commit edilmeye çalışılıyor!" && exit 1 || exit 0'
        pass_filenames: false
