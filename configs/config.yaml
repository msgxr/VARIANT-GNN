# Model Konfigürasyonu
# Tüm parametreler buradan okunur — kodda hardcoded değer kullanılmaz

general:
  seed: 42
  device: "auto"  # "cpu", "cuda", veya "auto"
  log_level: "INFO"
  log_file: null  # null ise sadece stdout

paths:
  data_dir: "data"
  models_dir: "models"
  reports_dir: "reports"

data:
  train_file: "data/train_variants.csv"
  test_file: "data/test_variants.csv"
  blind_test_file: "data/test_variants_blind.csv"
  target_column: "Label"
  id_column: "Variant_ID"
  test_size: 0.2
  stratify: true

preprocessing:
  corr_threshold: 0.20         # Graf kenarı korelasyon eşiği
  use_autoencoder: true        # AutoEncoder boyut zenginleştirme
  encoding_dim: 16             # AutoEncoder gizli boyut
  autoencoder_epochs: 10       # AutoEncoder eğitim uzunluğu
  use_pca: false               # PCA (AutoEncoder ile birlikte kullanılmaz)
  use_feature_selection: false # VarianceThreshold + SelectKBest
  k_best_features: 30          # Feature selection k değeri
  smote_enabled: true          # SMOTE veri dengeleme (yalnızca train fold)

gnn:
  hidden_dim: 64
  epochs: 30
  learning_rate: 0.005
  weight_decay: 1.0e-4
  use_gat: false               # false=SAGEConv (varsayılan), true=GAT (legacy)
  knn_k: 5                     # Koordinatsız cosine k-NN graf — k komşu sayısı
  early_stopping_patience: 7   # Validation Macro F1 erken durdurma
  model_selection_metric: "f1_macro"  # "accuracy" DEĞİL

xgboost:
  objective: "binary:logistic"
  eval_metric: "logloss"
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  n_estimators: 150
  n_jobs: -1

dnn:
  hidden_dim: 128
  epochs: 20
  learning_rate: 0.001
  weight_decay: 1.0e-4
  dropout: 0.4
  early_stopping_patience: 5
  model_selection_metric: "f1_macro"  # "accuracy" DEĞİL

ensemble:
  weights: [0.4, 0.4, 0.2]    # [XGB, GNN, DNN] — toplam 1.0 olmalı
  calibration_method: "isotonic"  # "isotonic", "platt", veya null
  threshold: 0.5               # Sınıflandırma eşiği

tuning:
  n_trials: 30
  optimize_metric: "f1_macro"
  optimize_ensemble_weights: false  # Deneysel

cross_validation:
  n_splits: 5
  shuffle: true
  per_fold_preprocessor: true  # MUTLAKA true olmalı — leakage önler

explainability:
  shap_sample_size: 200        # SHAP summary için örneklem büyüklüğü
  lime_num_samples: 1000
  lime_num_features: 15
  gnn_explainer_epochs: 100
