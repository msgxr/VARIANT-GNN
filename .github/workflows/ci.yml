name: CI — VARIANT-GNN Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check all source files
        run: |
          python -m py_compile src/config.py
          python -m py_compile src/models.py
          python -m py_compile src/data_processing.py
          python -m py_compile src/train.py
          python -m py_compile src/evaluate.py
          python -m py_compile src/explain.py
          python -m py_compile src/utils.py
          python -m py_compile main.py

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --timeout=120

      - name: Check import integrity
        run: |
          python -c "from src.config import Config; from src.models import FeatureGNN, VariantDNN, VariantHybridModel; print('Import OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 src/ --max-line-length=120 --ignore=E501,W503
