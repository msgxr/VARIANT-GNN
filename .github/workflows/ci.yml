name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ data_contracts/ tests/ main.py app.py

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch (no CUDA in CI)
        run: |
          pip install torch==2.2.0+cpu torchvision==0.17.0+cpu \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install torch-geometric CPU wheels
        run: |
          pip install torch-scatter torch-sparse torch-geometric \
            -f https://data.pyg.org/whl/torch-2.2.0+cpu.html

      - name: Install remaining requirements
        run: pip install -r requirements.txt

      - name: Smoke tests
        run: pytest tests/smoke/ -v --tb=short

      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Integration tests
        run: pytest tests/integration/ -v --tb=short

  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: |
          bandit -r src/ data_contracts/ main.py app.py \
            -ll -x tests/ \
            --skip B101,B301,B403
